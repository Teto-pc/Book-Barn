<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Barn Desktop Pro</title>
  <style>
    :root{
      --bg1:#0e2744;
      --bg2:#163b63;
      --panel:#f7f9fc;
      --line:#d8e0ea;
      --text:#1c2733;
      --muted:#6d7a88;
      --blue:#2563eb;
      --blue-dark:#1746a2;
      --green:#16a34a;
      --shadow:0 18px 40px rgba(0,0,0,.28);
      --title:#f1f5f9;
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;font-family:"Segoe UI",Arial,sans-serif;color:var(--text)}
    body{
      overflow:hidden;
      background:
        radial-gradient(circle at 18% 20%, rgba(255,255,255,.08), transparent 25%),
        radial-gradient(circle at 80% 25%, rgba(255,255,255,.05), transparent 22%),
        linear-gradient(135deg,var(--bg1),var(--bg2));
      user-select:none;
    }

    .desktop{
      position:relative;
      width:100%;
      height:calc(100% - 44px);
      padding:24px 18px;
    }

    .desktop-icons{
      display:flex;
      flex-direction:column;
      gap:16px;
      width:92px;
    }

    .desktop-icon{
      width:88px;
      padding:8px 6px;
      text-align:center;
      border-radius:10px;
      color:#fff;
      cursor:pointer;
      transition:.15s ease;
    }
    .desktop-icon:hover{
      background:rgba(255,255,255,.12);
      outline:1px solid rgba(255,255,255,.18);
    }
    .desktop-icon .emoji{
      font-size:34px;
      line-height:1;
      margin-bottom:8px;
      display:block;
      filter:drop-shadow(0 4px 8px rgba(0,0,0,.35));
    }
    .desktop-icon .label{
      font-size:13px;
      text-shadow:0 1px 3px rgba(0,0,0,.65);
      word-break:keep-all;
    }

    .taskbar{
      position:fixed;
      left:0;right:0;bottom:0;
      height:44px;
      background:rgba(17,24,39,.84);
      backdrop-filter:blur(10px);
      display:flex;
      align-items:center;
      justify-content:flex-end;
      padding:0 14px;
      color:#e5eef8;
      border-top:1px solid rgba(255,255,255,.08);
      z-index:60;
      font-size:13px;
      gap:12px;
    }
    .task-right{display:flex;align-items:center;gap:12px}

    .task-restore{
      margin-right:auto;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.08);
      color:#e5eef8;
      padding:6px 12px;
      border-radius:8px;
      cursor:pointer;
      display:none;
    }
    .task-restore.show{display:inline-flex}
    .task-restore:hover{background:rgba(255,255,255,.16)}

    .window{
      position:absolute;
      left:140px;
      top:44px;
      width:min(1180px, calc(100% - 200px));
      min-width:860px;
      height:min(760px, calc(100% - 120px));
      min-height:560px;
      background:#fff;
      border:1px solid #9fb1c7;
      border-radius:12px;
      overflow:hidden;
      box-shadow:var(--shadow);
      display:flex;
      flex-direction:column;
      z-index:20;
      resize:none;
    }
    .window.hidden{display:none}
    .window.maximized{
      left:0 !important;
      top:0 !important;
      width:100% !important;
      height:calc(100% - 44px) !important;
      min-width:0;
      min-height:0;
      border-radius:0;
      border-left:0;
      border-right:0;
      border-top:0;
    }

    .titlebar{
      height:42px;
      background:linear-gradient(180deg,#273244,#1c2432);
      color:var(--title);
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 0 0 14px;
      flex-shrink:0;
      cursor:grab;
    }
    .window.dragging .titlebar{cursor:grabbing}
    .titlebar-left{
      display:flex;
      align-items:center;
      gap:10px;
      font-size:14px;
      font-weight:600;
      min-width:0;
    }
    .titlebar-left span:last-child{
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .titlebar-controls{
      display:flex;
      align-items:stretch;
      height:100%;
      flex-shrink:0;
    }
    .win-btn{
      width:46px;
      height:42px;
      border:0;
      background:transparent;
      color:#e5e7eb;
      font-size:16px;
      cursor:pointer;
      transition:.15s ease;
    }
    .win-btn:hover{background:rgba(255,255,255,.12)}
    .win-btn.close:hover{background:#dc2626;color:#fff}

    .toolbar{
      background:#eef3f8;
      border-bottom:1px solid var(--line);
      padding:16px 18px 14px;
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      align-items:flex-start;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:210px;
      padding-top:4px;
    }
    .brand-badge{
      width:34px;height:34px;border-radius:10px;
      display:grid;place-items:center;
      background:#dbeafe;color:#1d4ed8;font-size:18px;
      border:1px solid #bfdbfe;
    }
    .brand h1{margin:0;font-size:18px;line-height:1.1}
    .brand small{display:block;color:var(--muted);font-size:12px;margin-top:2px}
    .search-panel{flex:1; min-width:540px}
    .searchbar-wrap{position:relative}
    .searchbar-row{display:flex;gap:10px;align-items:center}
    .search-input{
      flex:1;height:44px;border:1px solid #c9d4e0;border-radius:12px;padding:0 14px;
      font-size:15px;outline:none;background:#fff;
    }
    .search-input:focus{
      border-color:#7aa7ff;box-shadow:0 0 0 4px rgba(37,99,235,.10);
    }
    .search-btn{
      height:44px;border:0;border-radius:12px;padding:0 18px;background:var(--blue);
      color:#fff;font-weight:600;cursor:pointer;
    }
    .search-btn:hover{background:var(--blue-dark)}

    .filter-row{
      display:flex;gap:10px;align-items:center;margin-top:10px;flex-wrap:wrap;
    }
    .filter-select{
      height:36px;border:1px solid #c9d4e0;border-radius:10px;padding:0 12px;background:#fff;
      font-size:13px;color:#334155;
    }
    .hint{color:#64748b;font-size:12px;margin-left:auto}

    .hot-keywords{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      margin-top:10px;
    }
    .hot-title{
      font-size:12px;
      color:#64748b;
      margin-right:2px;
    }
    .hot-chip{
      border:1px solid #d8e3f1;
      background:#fff;
      height:30px;
      border-radius:999px;
      padding:0 11px;
      display:inline-flex;
      align-items:center;
      font-size:12px;
      cursor:pointer;
      color:#334155;
    }
    .hot-chip:hover{
      border-color:#bfdbfe;
      background:#eff6ff;
      color:#1d4ed8;
    }

    .suggestions{
      position:absolute;
      top:52px;left:0;right:74px;background:#fff;border:1px solid #d7e0ea;
      border-radius:12px;box-shadow:0 18px 40px rgba(16,24,40,.12);padding:8px;display:none;
      z-index:40;max-height:310px;overflow:auto;
    }
    .suggestions.show{display:block}
    .suggestion{
      padding:10px 12px;border-radius:10px;cursor:pointer;border:1px solid transparent;
      display:flex;justify-content:space-between;gap:16px;align-items:flex-start;
    }
    .suggestion:hover{background:#f6f9ff;border-color:#d8e6ff}
    .suggestion strong{display:block;font-size:14px;margin-bottom:2px}
    .suggestion span{color:var(--muted);font-size:12px}
    .suggestion .tag{color:#1d4ed8;white-space:nowrap;font-size:12px;margin-top:2px}

    .content{
      background:var(--panel);
      flex:1;
      overflow:auto;
      padding:18px;
      position:relative;
    }
    .results-header{
      background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-bottom:14px;
    }
    .results-header h2{
      font-size:18px;margin:0 0 10px;display:flex;align-items:center;gap:10px;
    }
    .divider{height:1px;background:var(--line);margin:10px 0 12px}
    .results-summary{font-size:14px;color:#334155}
    .results-summary strong{color:#111827}

    .collection-grid{
      display:grid;
      grid-template-columns:repeat(4, minmax(160px,1fr));
      gap:12px;
      margin-top:14px;
    }
    .collection-card{
      background:#f8fafc;border:1px solid #e6edf5;border-radius:14px;padding:14px;
    }
    .collection-card h4{margin:0 0 6px; font-size:14px}
    .collection-card p{margin:0; font-size:12px; color:#64748b; line-height:1.5}

    .result-list{display:flex;flex-direction:column;gap:14px}
    .result-card{
      background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px;
      display:grid;grid-template-columns:112px 1fr 180px;gap:18px;
    }
    .thumb{
      width:112px;height:154px;border-radius:12px;overflow:hidden;border:1px solid #dbe3ee;
      box-shadow:0 8px 18px rgba(15,23,42,.08);
      display:flex;flex-direction:column;justify-content:space-between;padding:12px;color:#fff;
    }
    .thumb small{font-size:11px;opacity:.95}
    .thumb strong{font-size:17px;line-height:1.15;display:block}
    .thumb .thumb-author{font-size:12px;opacity:.95}
    .cover-1{background:linear-gradient(135deg,#3b82f6,#1e3a8a)}
    .cover-2{background:linear-gradient(135deg,#14b8a6,#155e75)}
    .cover-3{background:linear-gradient(135deg,#f97316,#9a3412)}
    .cover-4{background:linear-gradient(135deg,#8b5cf6,#4c1d95)}
    .cover-5{background:linear-gradient(135deg,#22c55e,#166534)}
    .cover-6{background:linear-gradient(135deg,#ef4444,#7f1d1d)}

    .result-main h3{margin:0 0 10px;font-size:20px}
    .subline{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
    .badge{
      display:inline-flex;align-items:center;height:26px;border-radius:999px;padding:0 10px;
      font-size:12px;border:1px solid #dbe3ee;background:#f8fafc;color:#475569;
    }
    .badge.available{background:#ecfdf5;color:#166534;border-color:#bbf7d0}
    .badge.borrowed{background:#fff7ed;color:#9a3412;border-color:#fed7aa}
    .badge.reference{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe}

    .meta-grid{
      display:grid;grid-template-columns:repeat(4, minmax(120px, 1fr));gap:10px 14px;margin-top:10px;
    }
    .meta{
      background:#f8fafc;border:1px solid #e6edf5;border-radius:12px;padding:10px 12px;min-height:74px;
    }
    .meta-label{font-size:12px;color:var(--muted);margin-bottom:6px}
    .meta-value{font-size:14px;line-height:1.35;word-break:keep-all}

    .actions{
      display:flex;flex-direction:column;gap:10px;justify-content:center;align-items:stretch;
    }
    .action-btn{
      border:0;border-radius:12px;padding:12px 14px;font-weight:700;cursor:pointer;font-size:14px;
    }
    .buy-btn{background:#111827;color:#fff}
    .loan-btn{background:#16a34a;color:#fff}
    .detail-btn{background:#2563eb;color:#fff}
    .loan-btn.disabled{background:#94a3b8; cursor:not-allowed}
    .buy-btn:hover,.loan-btn:hover,.detail-btn:hover{opacity:.92}

    .empty-state{
      background:#fff;border:1px dashed #c7d3e0;border-radius:16px;padding:40px 24px;text-align:center;color:#64748b;
    }

    .pagination{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:8px;
      margin-top:16px;
      flex-wrap:wrap;
    }
    .page-btn{
      min-width:38px;
      height:38px;
      border-radius:10px;
      border:1px solid #d7e0ea;
      background:#fff;
      cursor:pointer;
      padding:0 12px;
      color:#334155;
      font-weight:600;
    }
    .page-btn.active{
      background:#2563eb;
      color:#fff;
      border-color:#2563eb;
    }
    .page-btn:disabled{
      opacity:.45;
      cursor:not-allowed;
    }

    .resize-handle{
      position:absolute;
      width:18px;
      height:18px;
      right:0;
      bottom:0;
      cursor:nwse-resize;
      z-index:35;
      background:
        linear-gradient(135deg, transparent 0 35%, #c5d2e0 35% 45%, transparent 45% 55%, #c5d2e0 55% 65%, transparent 65% 75%, #c5d2e0 75% 85%, transparent 85%);
    }
    .window.maximized .resize-handle{display:none}

    .modal-overlay{
      position:fixed; inset:0; background:rgba(15,23,42,.52); display:none;
      align-items:center; justify-content:center; z-index:120;
      padding:24px;
    }
    .modal-overlay.show{display:flex}
    .modal{
      width:min(920px, 100%);
      max-height:90vh;
      overflow:auto;
      background:#fff;
      border-radius:18px;
      border:1px solid #d7e0ea;
      box-shadow:0 24px 80px rgba(0,0,0,.35);
      display:grid;
      grid-template-columns:240px 1fr;
      gap:22px;
      padding:24px;
    }
    .modal-cover{
      width:100%;
      aspect-ratio: 0.72;
      border-radius:16px;
      padding:18px;
      color:#fff;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      box-shadow:0 12px 30px rgba(15,23,42,.16);
    }
    .modal-main h3{margin:0 0 10px;font-size:28px}
    .modal-close{
      position:absolute;
      top:14px;
      right:14px;
      width:40px;
      height:40px;
      border-radius:999px;
      border:0;
      background:#111827;
      color:#fff;
      cursor:pointer;
      font-size:18px;
    }
    .detail-grid{
      display:grid;
      grid-template-columns:repeat(2, minmax(160px, 1fr));
      gap:12px;
      margin-top:14px;
    }
    .detail-box{
      background:#f8fafc;
      border:1px solid #e6edf5;
      border-radius:12px;
      padding:12px 14px;
    }
    .detail-box strong{
      display:block;
      font-size:12px;
      color:#64748b;
      margin-bottom:7px;
    }
    .detail-box span{
      font-size:14px;
      color:#1f2937;
      line-height:1.45;
    }
    .detail-desc{
      margin-top:16px;
      background:#f8fafc;
      border:1px solid #e6edf5;
      border-radius:14px;
      padding:14px;
      color:#334155;
      line-height:1.7;
      font-size:14px;
    }

    @media (max-width: 1080px){
      .window{
        left:16px;right:16px;width:auto;min-width:0;
      }
      .result-card{grid-template-columns:1fr}
      .actions{flex-direction:row;flex-wrap:wrap}
      .meta-grid{grid-template-columns:repeat(2, minmax(120px, 1fr))}
      .collection-grid{grid-template-columns:repeat(2, minmax(160px,1fr))}
      .suggestions{right:0}
      .search-panel{min-width:0}
      .modal{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="desktop">
    <div class="desktop-icons">
      <div class="desktop-icon" id="desktop-bookbarn">
        <span class="emoji">📚</span>
        <div class="label">Book Barn</div>
      </div>
      <div class="desktop-icon" id="desktop-amazon">
        <span class="emoji">🛒</span>
        <div class="label">아마존</div>
      </div>
    </div>

    <section class="window" id="bookWindow" aria-label="도서 검색 창">
      <div class="titlebar" id="titlebar">
        <div class="titlebar-left">
          <span>📚</span>
          <span>Book Barn 도서검색</span>
        </div>
        <div class="titlebar-controls">
          <button class="win-btn" id="minBtn" title="최소화">—</button>
          <button class="win-btn" id="maxBtn" title="창모드 / 전체화면">□</button>
          <button class="win-btn close" id="closeBtn" title="닫기">✕</button>
        </div>
      </div>

      <div class="toolbar">
        <div class="brand">
          <div class="brand-badge">📖</div>
          <div>
            <h1>Book Barn</h1>
            <small>통합 도서검색 / 대출 / 열람 안내</small>
          </div>
        </div>

        <div class="search-panel">
          <div class="searchbar-wrap">
            <div class="searchbar-row">
              <input id="searchInput" class="search-input" type="text" placeholder="책 이름, 글쓴이, 태그를 입력하세요" autocomplete="off" />
              <button id="searchBtn" class="search-btn">검색</button>
            </div>
            <div id="suggestions" class="suggestions"></div>
          </div>

          <div class="filter-row">
            <select id="statusFilter" class="filter-select">
              <option value="all">전체 상태</option>
              <option value="대출 가능">대출 가능</option>
              <option value="대출 중">대출 중</option>
              <option value="열람 가능">열람 가능</option>
            </select>

            <select id="yearFilter" class="filter-select">
              <option value="all">전체 연도</option>
              <option value="2026">2026</option>
              <option value="2025">2025</option>
              <option value="2024">2024</option>
              <option value="2023">2023</option>
              <option value="2022">2022</option>
              <option value="2021이전">2021 이전</option>
            </select>

            <select id="sortFilter" class="filter-select">
              <option value="relevance">관련도순</option>
              <option value="title">제목순</option>
              <option value="year_desc">발행년도 최신순</option>
              <option value="year_asc">발행년도 오래된순</option>
            </select>

            <span class="hint">입력 즉시 연관검색 5개 표시</span>
          </div>

          <div class="hot-keywords">
            <span class="hot-title">인기검색어</span>
            <button class="hot-chip" data-keyword="도서관">도서관</button>
            <button class="hot-chip" data-keyword="수의학">수의학</button>
            <button class="hot-chip" data-keyword="평행우주">평행우주</button>
            <button class="hot-chip" data-keyword="캣닙">캣닙</button>
            <button class="hot-chip" data-keyword="오컬트">오컬트</button>
            <button class="hot-chip" data-keyword="도시">도시</button>
          </div>
        </div>
      </div>

      <div class="content">
        <div id="resultsArea"></div>
      </div>

      <div class="resize-handle" id="resizeHandle"></div>
    </section>
  </div>

  <div class="taskbar">
    <button id="taskRestore" class="task-restore">📚 Book Barn 도서검색 복원</button>
    <div class="task-right">
      <span>KO</span>
      <span id="clock">--:--</span>
    </div>
  </div>

  <div class="modal-overlay" id="detailModal">
    <div class="modal-wrap" style="position:relative;width:min(920px, 100%);">
      <button class="modal-close" id="modalClose">✕</button>
      <div class="modal" id="modalContent"></div>
    </div>
  </div>

  <script>
    const books = [
      { title:"Hope of the Pridelands", author:"Miss Auburn", tags:["판타지","시리즈","베스트셀러"], dueDate:"2026-04-06", status:"대출 가능", regNo:"BB-240031", supplement:"있음", year:"2026", callNo:"813.6 A927h", location:"종합자료실 A-3", publisher:"Lighthouse Press", loanable:true, category:"문학", desc:"왕국의 몰락과 재건을 다룬 장편 판타지 소설입니다. 웅장한 서사와 감정선이 잘 살아 있어 베스트셀러 자료로 분류되어 있습니다.", cover:1 },

    function updateClock(){
      const now = new Date();
      const hh = String(now.getHours()).padStart(2,'0');
      const mm = String(now.getMinutes()).padStart(2,'0');
      document.getElementById('clock').textContent = `${hh}:${mm}`;
    }
    updateClock();
    setInterval(updateClock, 1000);

    function normalize(text){
      return String(text || '').toLowerCase().trim();
    }
    function escapeHtml(text){
      return String(text)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function getSearchScore(book, query){
      const q = normalize(query);
      if(!q) return 0;
      let score = 0;
      const title = normalize(book.title);
      const author = normalize(book.author);
      const tags = normalize(book.tags.join(' '));
      const publisher = normalize(book.publisher);
      const location = normalize(book.location);
      const category = normalize(book.category);

      if(title === q) score += 100;
      if(title.includes(q)) score += 60;
      if(author.includes(q)) score += 35;
      if(tags.includes(q)) score += 45;
      if(publisher.includes(q)) score += 20;
      if(location.includes(q)) score += 12;
      if(category.includes(q)) score += 16;
      book.tags.forEach(tag => { if(normalize(tag) === q) score += 35; });

      return score;
    }

    function passesYearFilter(book){
      const val = yearFilter.value;
      if(val === 'all') return true;
      if(val === '2021이전') return Number(book.year) <= 2021;
      return book.year === val;
    }

    function filteredBooks(query){
      const q = normalize(query);
      let items = books.filter(book => {
        const score = q ? getSearchScore(book, q) : 1;
        const matchesSearch = q ? score > 0 : true;
        const matchesStatus = statusFilter.value === 'all' ? true : book.status === statusFilter.value;
        const matchesYear = passesYearFilter(book);
        return matchesSearch && matchesStatus && matchesYear;
      });

      const sort = sortFilter.value;
      items.sort((a,b) => {
        if(sort === 'title') return a.title.localeCompare(b.title, 'ko');
        if(sort === 'year_desc') return Number(b.year) - Number(a.year);
        if(sort === 'year_asc') return Number(a.year) - Number(b.year);
        return getSearchScore(b, q) - getSearchScore(a, q) || Number(b.year) - Number(a.year);
      });
      return items;
    }

    function topSuggestions(query){
      return filteredBooks(query).slice(0, 5);

    function getMatchedField(book, query){
      const q = normalize(query);
      if(!q) return '통합';
      if(normalize(book.title).includes(q)) return '책이름';
      if(normalize(book.author).includes(q)) return '글쓴이';
      if(normalize(book.tags.join(' ')).includes(q)) return '태그';
      if(normalize(book.publisher).includes(q)) return '출판사';
      if(normalize(book.location).includes(q)) return '소장위치';
      if(normalize(book.category).includes(q)) return '분야';
      return '통합';

      if(status === '대출 가능') return 'available';
      if(status === '대출 중') return 'borrowed';
      return 'reference';
    }

    function renderSuggestions(query){
      const items = topSuggestions(query);
      if(!query.trim() || items.length === 0){
        suggestions.classList.remove('show');
        suggestions.innerHTML = '';
        return;
      }
      suggestions.innerHTML = items.map(book => `
        <div class="suggestion" data-title="${escapeHtml(book.title)}">
          <div>
            <strong>${escapeHtml(book.title)}</strong>
            <span>${escapeHtml(book.author)} · ${escapeHtml(book.location)}</span>
          </div>
          <div class="tag">${escapeHtml(book.tags[0])}</div>
        </div>
      `).join('');
      suggestions.classList.add('show');
    }

    function renderInitialState(){
      const total = books.length;
      const available = books.filter(b => b.status === '대출 가능').length;
      const borrowed = books.filter(b => b.status === '대출 중').length;
      const reference = books.filter(b => b.status === '열람 가능').length;

      resultsArea.innerHTML = `
        <div class="results-header">
          <h2>🔎 도서 검색</h2>
          <div class="divider"></div>
          <div class="results-summary">
            현재 총 <strong>${total}</strong>건의 자료가 등록되어 있습니다. 책 이름, 글쓴이, 태그로 검색할 수 있으며 연관검색은 최대 <strong>5개</strong>까지 표시됩니다.
          </div>
          <div class="collection-grid">
            <div class="collection-card"><h4>대출 가능</h4><p>${available}건의 자료가 즉시 대출 가능합니다.</p></div>
            <div class="collection-card"><h4>대출 중</h4><p>${borrowed}건은 현재 대출 중입니다.</p></div>
            <div class="collection-card"><h4>열람 가능</h4><p>${reference}건은 자료실 내 열람 전용입니다.</p></div>
            <div class="collection-card"><h4>추천 검색어</h4><p>도서관, 수의학, 평행우주, 캣닙, 도서검색</p></div>
          </div>
        </div>
        <div class="empty-state">검색어를 입력해 주세요.</div>
      `;
    }

    function metaBox(label, value){
      return `
        <div class="meta">
          <div class="meta-label">${escapeHtml(label)}</div>
          <div class="meta-value">${escapeHtml(value)}</div>
        </div>
      `;
    }

    function renderResults(query, page=1){
      currentQuery = query;
      currentResults = filteredBooks(query);
      currentPage = page;

      const items = currentResults;
      const totalPages = Math.max(1, Math.ceil(items.length / PAGE_SIZE));
      if(currentPage > totalPages) currentPage = totalPages;
      const startIndex = (currentPage - 1) * PAGE_SIZE;
      const pageItems = items.slice(startIndex, startIndex + PAGE_SIZE);
      const safeQuery = escapeHtml(query);

      const header = `
        <div class="results-header">
          <h2>📚 검색 결과</h2>
          <div class="divider"></div>
          <div class="results-summary">
            검색어 '<strong>${safeQuery}</strong>'에 대한 총 <strong>${items.length}</strong>건이 검색되었습니다.
          </div>
        </div>
      `;

      if(items.length === 0){
        resultsArea.innerHTML = header + `<div class="empty-state">일치하는 자료가 없습니다.</div>`;
        return;
      }

      const cards = pageItems.map((book, idx) => `
        <article class="result-card">
          <div class="thumb cover-${book.cover}">
            <small>${escapeHtml(book.category)}</small>
            <strong>${escapeHtml(book.title)}</strong>
            <div class="thumb-author">${escapeHtml(book.author)}</div>
          </div>
          <div class="result-main">
            <h3>${escapeHtml(book.title)}</h3>
            <div class="subline">
              <span class="badge ${getStatusBadgeClass(book.status)}">${escapeHtml(book.status)}</span>
              <span class="badge">${escapeHtml(book.location)}</span>
              <span class="badge">${escapeHtml(book.callNo)}</span>
            </div>
            <div class="meta-grid">
              ${metaBox('글쓴이', book.author)}
              ${metaBox('태그', book.tags.join(', '))}
              ${metaBox('반납예정일', book.dueDate)}
              ${metaBox('자료상태', book.status)}
              ${metaBox('등록번호', book.regNo)}
              ${metaBox('부록여부', book.supplement)}
              ${metaBox('발행년도', book.year)}
              ${metaBox('검색기준', getMatchedField(book, query))}
              ${metaBox('청구기호', book.callNo)}
              ${metaBox('소장위치', book.location)}
              ${metaBox('출판사', book.publisher)}
              ${metaBox('대출가능여부', book.loanable ? '가능' : '불가')}
            </div>
          </div>
          <div class="actions">
            <button class="action-btn detail-btn" data-detail="${escapeHtml(book.regNo)}">상세보기</button>
            <button class="action-btn buy-btn" data-buy="${escapeHtml(book.regNo)}">구매하기</button>
            <button class="action-btn loan-btn ${book.loanable ? '' : 'disabled'}" data-loan="${escapeHtml(book.regNo)}">${book.loanable ? '대출하기' : '대출불가'}</button>
          </div>
        </article>
      `).join('');

      let pagination = `<div class="pagination">`;
      pagination += `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} data-page="${currentPage - 1}">이전</button>`;
      for(let i=1;i<=totalPages;i++){
        pagination += `<button class="page-btn ${i===currentPage ? 'active' : ''}" data-page="${i}">${i}</button>`;
      }
      pagination += `<button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} data-page="${currentPage + 1}">다음</button>`;
      pagination += `</div>`;

      resultsArea.innerHTML = header + `<div class="result-list">${cards}</div>` + pagination;
    }

    function doSearch(value, page=1){
      const q = value.trim();
      suggestions.classList.remove('show');
      if(!q){
        currentQuery = '';
        currentResults = [];
        currentPage = 1;
        renderInitialState();
        return;
      }
      renderResults(q, page);
    }

    function openDetail(regNo){
      const book = books.find(b => b.regNo === regNo);
      if(!book) return;
      modalContent.innerHTML = `
        <div class="modal-cover cover-${book.cover}">
          <small>${escapeHtml(book.category)}</small>
          <strong>${escapeHtml(book.title)}</strong>
          <div class="thumb-author">${escapeHtml(book.author)}</div>
        </div>
        <div class="modal-main">
          <h3>${escapeHtml(book.title)}</h3>
          <div class="subline">
            <span class="badge ${getStatusBadgeClass(book.status)}">${escapeHtml(book.status)}</span>
            <span class="badge">${escapeHtml(book.location)}</span>
            <span class="badge">${escapeHtml(book.callNo)}</span>
          </div>
          <div class="detail-grid">
            <div class="detail-box"><strong>글쓴이</strong><span>${escapeHtml(book.author)}</span></div>
            <div class="detail-box"><strong>출판사</strong><span>${escapeHtml(book.publisher)}</span></div>
            <div class="detail-box"><strong>발행년도</strong><span>${escapeHtml(book.year)}</span></div>
            <div class="detail-box"><strong>태그</strong><span>${escapeHtml(book.tags.join(', '))}</span></div>
            <div class="detail-box"><strong>등록번호</strong><span>${escapeHtml(book.regNo)}</span></div>
            <div class="detail-box"><strong>청구기호</strong><span>${escapeHtml(book.callNo)}</span></div>
            <div class="detail-box"><strong>소장위치</strong><span>${escapeHtml(book.location)}</span></div>
            <div class="detail-box"><strong>반납예정일</strong><span>${escapeHtml(book.dueDate)}</span></div>
            <div class="detail-box"><strong>자료상태</strong><span>${escapeHtml(book.status)}</span></div>
            <div class="detail-box"><strong>부록여부</strong><span>${escapeHtml(book.supplement)}</span></div>
          </div>
          <div class="detail-desc">${escapeHtml(book.desc)}</div>
          <div class="actions" style="margin-top:16px; flex-direction:row;">
            <button class="action-btn buy-btn" onclick="alert('구매 페이지로 이동하는 동작을 연결하면 됩니다.')">구매하기</button>
            <button class="action-btn loan-btn ${book.loanable ? '' : 'disabled'}" onclick="alert('${book.loanable ? '대출 신청이 가능합니다.' : '현재 대출할 수 없는 자료입니다.'}')">${book.loanable ? '대출하기' : '대출불가'}</button>
          </div>
        </div>
      `;
      detailModal.classList.add('show');
    }

    searchInput.addEventListener('input', (e) => renderSuggestions(e.target.value));
    searchInput.addEventListener('keydown', (e) => { if(e.key === 'Enter') doSearch(searchInput.value); });
    searchBtn.addEventListener('click', () => doSearch(searchInput.value));

    suggestions.addEventListener('click', (e) => {
      const item = e.target.closest('.suggestion');
      if(!item) return;
      const title = item.dataset.title;
      searchInput.value = title;
      doSearch(title);
    });

    document.addEventListener('click', (e) => {
      if(!e.target.closest('.searchbar-wrap')) suggestions.classList.remove('show');

      const pageBtn = e.target.closest('.page-btn');
      if(pageBtn && !pageBtn.disabled){
        const targetPage = Number(pageBtn.dataset.page);
        renderResults(currentQuery, targetPage);
      }

      const detailBtn = e.target.closest('[data-detail]');
      if(detailBtn) openDetail(detailBtn.dataset.detail);

      const buyBtn = e.target.closest('[data-buy]');
      if(buyBtn) alert('구매 페이지로 이동하는 동작을 연결하면 됩니다.');

      const loanBtn = e.target.closest('[data-loan]');
      if(loanBtn){
        const book = books.find(b => b.regNo === loanBtn.dataset.loan);
        if(book) alert(book.loanable ? '대출 신청이 가능합니다.' : '현재 대출할 수 없는 자료입니다.');
      }

      const hot = e.target.closest('.hot-chip');
      if(hot){
        const keyword = hot.dataset.keyword;
        searchInput.value = keyword;
        doSearch(keyword);
      }
    });

    [statusFilter, yearFilter, sortFilter].forEach(el => {
      el.addEventListener('change', () => {
        if(searchInput.value.trim()){
          renderSuggestions(searchInput.value);
          renderResults(searchInput.value, 1);
        } else {
          renderInitialState();
        }
      });
    });

    function minimizeWindow(){
      bookWindow.classList.add('hidden');
      taskRestore.classList.add('show');
    }
    function restoreWindow(){
      bookWindow.classList.remove('hidden');
      taskRestore.classList.remove('show');
      searchInput.focus();
    }

    minBtn.addEventListener('click', minimizeWindow);
    taskRestore.addEventListener('click', restoreWindow);
    desktopBookbarn.addEventListener('dblclick', restoreWindow);
    desktopBookbarn.addEventListener('click', restoreWindow);
    closeBtn.addEventListener('click', () => {
      bookWindow.classList.add('hidden');
      taskRestore.classList.remove('show');
    });

    let prevRect = null;
    function toggleMaximize(){
      if(!bookWindow.classList.contains('maximized')){
        prevRect = {
          left: bookWindow.style.left || `${bookWindow.offsetLeft}px`,
          top: bookWindow.style.top || `${bookWindow.offsetTop}px`,
          width: bookWindow.style.width || `${bookWindow.offsetWidth}px`,
          height: bookWindow.style.height || `${bookWindow.offsetHeight}px`,
        };
        bookWindow.classList.add('maximized');
        maxBtn.textContent = '❐';
      } else {
        bookWindow.classList.remove('maximized');
        if(prevRect){
          bookWindow.style.left = prevRect.left;
          bookWindow.style.top = prevRect.top;
          bookWindow.style.width = prevRect.width;
          bookWindow.style.height = prevRect.height;
        }
        maxBtn.textContent = '□';
      }
    }
    maxBtn.addEventListener('click', toggleMaximize);
    titlebar.addEventListener('dblclick', (e) => {
      if(e.target.closest('.titlebar-controls')) return;
      toggleMaximize();
    });

    // Dragging
    let dragging = false;
    let dragOffsetX = 0;
    let dragOffsetY = 0;

    titlebar.addEventListener('mousedown', (e) => {
      if(e.target.closest('.titlebar-controls')) return;
      if(bookWindow.classList.contains('maximized')) return;
      dragging = true;
      bookWindow.classList.add('dragging');
      dragOffsetX = e.clientX - bookWindow.offsetLeft;
      dragOffsetY = e.clientY - bookWindow.offsetTop;
    });

    // Resizing
    let resizing = false;
    let startW = 0, startH = 0, startX = 0, startY = 0;
    resizeHandle.addEventListener('mousedown', (e) => {
      if(bookWindow.classList.contains('maximized')) return;
      resizing = true;
      startW = bookWindow.offsetWidth;
      startH = bookWindow.offsetHeight;
      startX = e.clientX;
      startY = e.clientY;
      e.preventDefault();
      e.stopPropagation();
    });

    document.addEventListener('mousemove', (e) => {
      if(dragging){
        const maxLeft = window.innerWidth - bookWindow.offsetWidth;
        const maxTop = window.innerHeight - 44 - bookWindow.offsetHeight;
        const left = Math.min(Math.max(0, e.clientX - dragOffsetX), Math.max(0, maxLeft));
        const top = Math.min(Math.max(0, e.clientY - dragOffsetY), Math.max(0, maxTop));
        bookWindow.style.left = `${left}px`;
        bookWindow.style.top = `${top}px`;
      }
      if(resizing){
        const minW = 860;
        const minH = 560;
        const maxW = window.innerWidth - bookWindow.offsetLeft;
        const maxH = window.innerHeight - 44 - bookWindow.offsetTop;
        const newW = Math.min(Math.max(minW, startW + (e.clientX - startX)), maxW);
        const newH = Math.min(Math.max(minH, startH + (e.clientY - startY)), maxH);
        bookWindow.style.width = `${newW}px`;
        bookWindow.style.height = `${newH}px`;
      }
    });

    document.addEventListener('mouseup', () => {
      dragging = false;
      resizing = false;
      bookWindow.classList.remove('dragging');
    });

    document.getElementById('desktop-amazon').addEventListener('dblclick', () => {
      alert('아마존 아이콘이 추가되어 있습니다. 실제 링크를 연결하려면 원하는 주소를 넣으면 됩니다.');
    });

    modalClose.addEventListener('click', () => detailModal.classList.remove('show'));
    detailModal.addEventListener('click', (e) => {
      if(e.target === detailModal) detailModal.classList.remove('show');
    });
    document.addEventListener('keydown', (e) => {
      if(e.key === 'Escape') detailModal.classList.remove('show');
    });

    renderInitialState();
    window.addEventListener('load', () => {
      bookWindow.classList.remove('hidden');
      searchInput.focus();
    });
  </script>
</body>
</html>
