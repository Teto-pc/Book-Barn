<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Barn Library Terminal</title>
  <style>
    :root{
      --bg1:#0e2744;
      --bg2:#163b63;
      --panel:#f7f9fc;
      --line:#d8e0ea;
      --text:#1c2733;
      --muted:#6d7a88;
      --blue:#2563eb;
      --blue-dark:#1746a2;
      --shadow:0 18px 40px rgba(0,0,0,.28);
      --title:#f1f5f9;
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;font-family:"Segoe UI",Arial,sans-serif;color:var(--text)}
    body{
      overflow:hidden;
      background:
        radial-gradient(circle at 18% 20%, rgba(255,255,255,.08), transparent 25%),
        radial-gradient(circle at 80% 25%, rgba(255,255,255,.05), transparent 22%),
        linear-gradient(135deg,var(--bg1),var(--bg2));
      user-select:none;
      -webkit-user-select:none;
    }

    .meta-value,
    .meta-label,
    .result-main,
    .modal-main,
    .detail-box span,
    .detail-desc,
    .search-input{
      user-select:text;
      -webkit-user-select:text;
      cursor:text;
    }

    .desktop{
      position:relative;
      width:100%;
      height:100%;
      padding:24px 18px;
    }

    .desktop-icons{
      display:flex;
      flex-direction:column;
      gap:16px;
      width:92px;
    }

    .desktop-icon{
      width:88px;
      padding:8px 6px;
      text-align:center;
      border-radius:10px;
      color:#fff;
      cursor:pointer;
      transition:.15s ease;
    }
    .desktop-icon:hover{
      background:rgba(255,255,255,.12);
      outline:1px solid rgba(255,255,255,.18);
    }
    .desktop-icon .emoji{
      font-size:34px;
      line-height:1;
      margin-bottom:8px;
      display:block;
      filter:drop-shadow(0 4px 8px rgba(0,0,0,.35));
    }
    .desktop-icon .label{
      font-size:13px;
      text-shadow:0 1px 3px rgba(0,0,0,.65);
      word-break:keep-all;
    }

    .taskbar{
      position:fixed;
      left:0;right:0;bottom:0;
      height:44px;
      background:rgba(17,24,39,.84);
      backdrop-filter:blur(10px);
      display:flex;
      align-items:center;
      justify-content:flex-end;
      padding:0 14px;
      color:#e5eef8;
      border-top:1px solid rgba(255,255,255,.08);
      z-index:60;
      font-size:13px;
      gap:12px;
    }
    .task-right{display:flex;align-items:center;gap:12px}
    .task-restore{
      margin-right:auto;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.08);
      color:#e5eef8;
      padding:6px 12px;
      border-radius:8px;
      cursor:pointer;
      display:none;
    }
    .task-restore.show{display:inline-flex}
    .task-restore:hover{background:rgba(255,255,255,.16)}

    .window{
      position:absolute;
      left:140px;
      top:44px;
      width:min(1180px, calc(100% - 200px));
      min-width:860px;
      height:min(760px, calc(100% - 120px));
      min-height:560px;
      background:#fff;
      border:1px solid #9fb1c7;
      border-radius:12px;
      overflow:hidden;
      box-shadow:var(--shadow);
      display:flex;
      flex-direction:column;
      z-index:20;
    }
    .window.hidden{display:none}
    .window.maximized{
      left:0 !important;
      top:0 !important;
      width:100% !important;
      height:100% !important;
      min-width:0;
      min-height:0;
      border-radius:0;
      border-left:0;
      border-right:0;
      border-top:0;
    }

    .titlebar{
      height:42px;
      background:linear-gradient(180deg,#273244,#1c2432);
      color:var(--title);
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 0 0 14px;
      flex-shrink:0;
      cursor:grab;
    }
    .window.dragging .titlebar{cursor:grabbing}
    .titlebar-left{
      display:flex;
      align-items:center;
      gap:10px;
      font-size:14px;
      font-weight:600;
      min-width:0;
    }
    .titlebar-left span:last-child{
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .titlebar-controls{
      display:flex;
      align-items:stretch;
      height:100%;
      flex-shrink:0;
    }
    .win-btn{
      width:46px;
      height:42px;
      border:0;
      background:transparent;
      color:#e5e7eb;
      font-size:16px;
      cursor:pointer;
      transition:.15s ease;
    }
    .win-btn:hover{background:rgba(255,255,255,.12)}
    .win-btn.close:hover{background:#dc2626;color:#fff}

    .toolbar{
      background:#eef3f8;
      border-bottom:1px solid var(--line);
      padding:16px 18px 14px;
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      align-items:flex-start;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:210px;
      padding-top:4px;
    }
    .brand-badge{
      width:34px;
      height:34px;
      border-radius:10px;
      display:grid;
      place-items:center;
      background:#dbeafe;
      color:#1d4ed8;
      font-size:18px;
      border:1px solid #bfdbfe;
    }
    .brand h1{margin:0;font-size:18px;line-height:1.1}
    .brand small{display:block;color:var(--muted);font-size:12px;margin-top:2px}
    .search-panel{flex:1; min-width:540px}
    .searchbar-wrap{position:relative}
    .searchbar-row{display:flex;gap:10px;align-items:center}
    .search-input{
      flex:1;
      height:44px;
      border:1px solid #c9d4e0;
      border-radius:12px;
      padding:0 14px;
      font-size:15px;
      outline:none;
      background:#fff;
    }
    .search-input:focus{
      border-color:#7aa7ff;
      box-shadow:0 0 0 4px rgba(37,99,235,.10);
    }
    .search-btn{
      height:44px;
      border:0;
      border-radius:12px;
      padding:0 18px;
      background:var(--blue);
      color:#fff;
      font-weight:600;
      cursor:pointer;
    }
    .search-btn:hover{background:var(--blue-dark)}

    .filter-row{
      display:flex;
      gap:10px;
      align-items:center;
      margin-top:10px;
      flex-wrap:wrap;
    }
    .filter-select{
      height:36px;
      border:1px solid #c9d4e0;
      border-radius:10px;
      padding:0 12px;
      background:#fff;
      font-size:13px;
      color:#334155;
    }
    .hint{
      color:#64748b;
      font-size:12px;
      margin-left:auto;
    }

    .hot-keywords{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      margin-top:10px;
    }
    .hot-title{
      font-size:12px;
      color:#64748b;
      margin-right:2px;
    }
    .hot-chip{
      border:1px solid #d8e3f1;
      background:#fff;
      height:30px;
      border-radius:999px;
      padding:0 11px;
      display:inline-flex;
      align-items:center;
      font-size:12px;
      cursor:pointer;
      color:#334155;
    }
    .hot-chip:hover{
      border-color:#bfdbfe;
      background:#eff6ff;
      color:#1d4ed8;
    }

    .suggestions{
      position:absolute;
      top:52px;
      left:0;
      right:74px;
      background:#fff;
      border:1px solid #d7e0ea;
      border-radius:12px;
      box-shadow:0 18px 40px rgba(16,24,40,.12);
      padding:8px;
      display:none;
      z-index:40;
      max-height:310px;
      overflow:auto;
    }
    .suggestions.show{display:block}
    .suggestion{
      padding:10px 12px;
      border-radius:10px;
      cursor:pointer;
      border:1px solid transparent;
      display:flex;
      justify-content:space-between;
      gap:16px;
      align-items:flex-start;
    }
    .suggestion:hover{
      background:#f6f9ff;
      border-color:#d8e6ff;
    }
    .suggestion strong{
      display:block;
      font-size:14px;
      margin-bottom:2px;
    }
    .suggestion span{
      color:var(--muted);
      font-size:12px;
    }
    .suggestion .tag{
      color:#1d4ed8;
      white-space:nowrap;
      font-size:12px;
      margin-top:2px;
    }

    .content{
      background:var(--panel);
      flex:1;
      overflow:auto;
      padding:18px;
      position:relative;
    }
    .results-header{
      background:#fff;
      border:1px solid var(--line);
      border-radius:14px;
      padding:16px 18px;
      margin-bottom:14px;
    }
    .results-header h2{
      font-size:18px;
      margin:0 0 10px;
      display:flex;
      align-items:center;
      gap:10px;
    }
    .divider{
      height:1px;
      background:var(--line);
      margin:10px 0 12px;
    }
    .results-summary{
      font-size:14px;
      color:#334155;
    }
    .results-summary strong{color:#111827}

    .collection-grid{
      display:grid;
      grid-template-columns:repeat(4, minmax(160px,1fr));
      gap:12px;
      margin-top:14px;
    }
    .collection-card{
      background:#f8fafc;
      border:1px solid #e6edf5;
      border-radius:14px;
      padding:14px;
    }
    .collection-card h4{
      margin:0 0 6px;
      font-size:14px;
    }
    .collection-card p{
      margin:0;
      font-size:12px;
      color:#64748b;
      line-height:1.5;
    }

    .result-list{
      display:flex;
      flex-direction:column;
      gap:14px;
    }
    .result-card{
      background:#fff;
      border:1px solid var(--line);
      border-radius:16px;
      padding:18px;
      display:grid;
      grid-template-columns:112px 1fr 180px;
      gap:18px;
    }
    .thumb{
      width:112px;
      height:154px;
      border-radius:12px;
      overflow:hidden;
      border:1px solid #dbe3ee;
      box-shadow:0 8px 18px rgba(15,23,42,.08);
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      padding:12px;
      color:#fff;
    }
    .thumb small{font-size:11px;opacity:.95}
    .thumb strong{font-size:17px;line-height:1.15;display:block}
    .thumb .thumb-author{font-size:12px;opacity:.95}
    .cover-1{background:linear-gradient(135deg,#3b82f6,#1e3a8a)}
    .cover-2{background:linear-gradient(135deg,#14b8a6,#155e75)}
    .cover-3{background:linear-gradient(135deg,#f97316,#9a3412)}
    .cover-4{background:linear-gradient(135deg,#8b5cf6,#4c1d95)}
    .cover-5{background:linear-gradient(135deg,#22c55e,#166534)}
    .cover-6{background:linear-gradient(135deg,#ef4444,#7f1d1d)}

    .result-main h3{
      margin:0 0 10px;
      font-size:20px;
    }
    .subline{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-bottom:12px;
    }
    .badge{
      display:inline-flex;
      align-items:center;
      height:26px;
      border-radius:999px;
      padding:0 10px;
      font-size:12px;
      border:1px solid #dbe3ee;
      background:#f8fafc;
      color:#475569;
    }
    .badge.available{background:#ecfdf5;color:#166534;border-color:#bbf7d0}
    .badge.borrowed{background:#fff7ed;color:#9a3412;border-color:#fed7aa}
    .badge.reference{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe}

    .meta-grid{
      display:grid;
      grid-template-columns:repeat(4, minmax(120px, 1fr));
      gap:10px 14px;
      margin-top:10px;
    }
    .meta{
      background:#f8fafc;
      border:1px solid #e6edf5;
      border-radius:12px;
      padding:10px 12px;
      min-height:74px;
    }
    .meta-label{
      font-size:12px;
      color:var(--muted);
      margin-bottom:6px;
    }
    .meta-value{
      font-size:14px;
      line-height:1.35;
      word-break:keep-all;
    }

    .actions{
      display:flex;
      flex-direction:column;
      gap:10px;
      justify-content:center;
      align-items:stretch;
    }
    .action-btn{
      border:0;
      border-radius:12px;
      padding:12px 14px;
      font-weight:700;
      cursor:pointer;
      font-size:14px;
    }
    .buy-btn{background:#111827;color:#fff}
    .loan-btn{background:#16a34a;color:#fff}
    .detail-btn{background:#2563eb;color:#fff}
    .loan-btn.disabled{background:#94a3b8; cursor:not-allowed}
    .buy-btn:hover,.loan-btn:hover,.detail-btn:hover{opacity:.92}

    .copy-btn{
      margin-left:8px;
      height:24px;
      border:1px solid #cbd5e1;
      border-radius:8px;
      background:#fff;
      color:#334155;
      font-size:12px;
      padding:0 8px;
      cursor:pointer;
      vertical-align:middle;
    }
    .copy-btn:hover{
      background:#eff6ff;
      border-color:#93c5fd;
      color:#1d4ed8;
    }

    .empty-state{
      background:#fff;
      border:1px dashed #c7d3e0;
      border-radius:16px;
      padding:40px 24px;
      text-align:center;
      color:#64748b;
    }

    .pagination{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:8px;
      margin-top:16px;
      flex-wrap:wrap;
    }
    .page-btn{
      min-width:38px;
      height:38px;
      border-radius:10px;
      border:1px solid #d7e0ea;
      background:#fff;
      cursor:pointer;
      padding:0 12px;
      color:#334155;
      font-weight:600;
    }
    .page-btn.active{
      background:#2563eb;
      color:#fff;
      border-color:#2563eb;
    }
    .page-btn:disabled{
      opacity:.45;
      cursor:not-allowed;
    }

    .resize-handle{
      position:absolute;
      width:18px;
      height:18px;
      right:0;
      bottom:0;
      cursor:nwse-resize;
      z-index:35;
      background:
        linear-gradient(135deg, transparent 0 35%, #c5d2e0 35% 45%, transparent 45% 55%, #c5d2e0 55% 65%, transparent 65% 75%, #c5d2e0 75% 85%, transparent 85%);
    }
    .window.maximized .resize-handle{display:none}

    .modal-overlay{
      position:fixed;
      inset:0;
      background:rgba(15,23,42,.52);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:120;
      padding:24px;
    }
    .modal-overlay.show{display:flex}
    .modal-wrap{
      position:relative;
      width:min(920px, 100%);
    }
    .modal{
      width:100%;
      max-height:90vh;
      overflow:auto;
      background:#fff;
      border-radius:18px;
      border:1px solid #d7e0ea;
      box-shadow:0 24px 80px rgba(0,0,0,.35);
      display:grid;
      grid-template-columns:240px 1fr;
      gap:22px;
      padding:24px;
    }
    .modal-cover{
      width:100%;
      aspect-ratio:0.72;
      border-radius:16px;
      padding:18px;
      color:#fff;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      box-shadow:0 12px 30px rgba(15,23,42,.16);
    }
    .modal-main h3{
      margin:0 0 10px;
      font-size:28px;
    }
    .modal-close{
      position:absolute;
      top:14px;
      right:14px;
      width:40px;
      height:40px;
      border-radius:999px;
      border:0;
      background:#111827;
      color:#fff;
      cursor:pointer;
      font-size:18px;
    }
    .detail-grid{
      display:grid;
      grid-template-columns:repeat(2, minmax(160px, 1fr));
      gap:12px;
      margin-top:14px;
    }
    .detail-box{
      background:#f8fafc;
      border:1px solid #e6edf5;
      border-radius:12px;
      padding:12px 14px;
    }
    .detail-box strong{
      display:block;
      font-size:12px;
      color:#64748b;
      margin-bottom:7px;
    }
    .detail-box span{
      font-size:14px;
      color:#1f2937;
      line-height:1.45;
    }
    .detail-desc{
      margin-top:16px;
      background:#f8fafc;
      border:1px solid #e6edf5;
      border-radius:14px;
      padding:14px;
      color:#334155;
      line-height:1.7;
      font-size:14px;
    }

    @media (max-width: 1080px){
      .window{
        left:16px;
        right:16px;
        width:auto;
        min-width:0;
      }
      .result-card{grid-template-columns:1fr}
      .actions{flex-direction:row;flex-wrap:wrap}
      .meta-grid{grid-template-columns:repeat(2, minmax(120px, 1fr))}
      .collection-grid{grid-template-columns:repeat(2, minmax(160px,1fr))}
      .suggestions{right:0}
      .search-panel{min-width:0}
      .modal{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="desktop">
    <div class="desktop-icons">
      <div class="desktop-icon" id="desktop-bookbarn">
        <span class="emoji">📚</span>
        <div class="label">Book Barn</div>
      </div>
      <div class="desktop-icon" id="desktop-amazon">
        <span class="emoji">🛒</span>
        <div class="label">Amazon</div>
      </div>
    </div>

    <section class="window" id="bookWindow" aria-label="Library search window">
      <div class="titlebar" id="titlebar">
        <div class="titlebar-left">
          <span>📚</span>
          <span>Book Barn Search</span>
        </div>
        <div class="titlebar-controls">
          <button class="win-btn" id="minBtn" title="Minimize">—</button>
          <button class="win-btn" id="maxBtn" title="Windowed / Full Screen">□</button>
          <button class="win-btn close" id="closeBtn" title="Close">✕</button>
        </div>
      </div>

      <div class="toolbar">
        <div class="brand">
          <div class="brand-badge">📖</div>
          <div>
            <h1>Book Barn</h1>
            <small>Unified Catalog / Checkouts / Reference</small>
          </div>
        </div>

        <div class="search-panel">
          <div class="searchbar-wrap">
            <div class="searchbar-row">
              <input id="searchInput" class="search-input" type="text" placeholder="Search by title, author, or tag" autocomplete="off" />
              <button id="searchBtn" class="search-btn">Search</button>
            </div>
            <div id="suggestions" class="suggestions"></div>
          </div>

          <div class="filter-row">
            <select id="statusFilter" class="filter-select">
              <option value="all">All Availability</option>
              <option value="Available">Available</option>
              <option value="Checked Out">Checked Out</option>
              <option value="In-Library Use Only">In-Library Use Only</option>
            </select>

            <select id="yearFilter" class="filter-select">
              <option value="all">All Publication Years</option>
              <option value="2026">2026</option>
              <option value="2025">2025</option>
              <option value="2024">2024</option>
              <option value="2023">2023</option>
              <option value="2022">2022</option>
              <option value="2021 or earlier">2021 or earlier</option>
            </select>

            <select id="sortFilter" class="filter-select">
              <option value="relevance">Relevance</option>
              <option value="title">Title (A-Z)</option>
              <option value="year_desc">Newest First</option>
              <option value="year_asc">Oldest First</option>
            </select>

            <span class="hint">Instant suggestions (max 5)</span>
          </div>

          <div class="hot-keywords">
            <span class="hot-title">Popular Searches</span>
            <button class="hot-chip" data-keyword="library">library</button>
            <button class="hot-chip" data-keyword="veterinary">veterinary</button>
            <button class="hot-chip" data-keyword="parallel">parallel</button>
            <button class="hot-chip" data-keyword="catnip">catnip</button>
            <button class="hot-chip" data-keyword="occult">occult</button>
            <button class="hot-chip" data-keyword="city">city</button>
          </div>
        </div>
      </div>

      <div class="content">
        <div id="resultsArea"></div>
      </div>

      <div class="resize-handle" id="resizeHandle"></div>
    </section>
  </div>

  <div class="taskbar">
    <button id="taskRestore" class="task-restore">📚 Restore Library Window</button>
    <div class="task-right">
      <span>EN</span>
      <span id="clock">--:--</span>
    </div>
  </div>

  <div class="modal-overlay" id="detailModal">
    <div class="modal-wrap">
      <button class="modal-close" id="modalClose">✕</button>
      <div class="modal" id="modalContent"></div>
    </div>
  </div>

  <script>
    const books = [
      { title:"Hope of the Pridelands", author:"Miss Auburn", tags:["fantasy","series","bestseller"], dueDate:"2026-04-06", status:"Available", regNo:"BB-240031", supplement:"Included", year:"2026", callNo:"813.6 A927h", location:"General Stacks A-3", publisher:"Lighthouse Press", loanable:true, category:"Fiction", desc:"A bestselling fantasy novel about the fall and rebuilding of a kingdom.", cover:1 },

    const PAGE_SIZE = 6;
    let currentPage = 1;
    let currentResults = [];
    let currentQuery = '';

    const searchBtn = document.getElementById('searchBtn');
    const suggestions = document.getElementById('suggestions');
    const resultsArea = document.getElementById('resultsArea');
    const bookWindow = document.getElementById('bookWindow');
    const taskRestore = document.getElementById('taskRestore');
    const minBtn = document.getElementById('minBtn');
    const maxBtn = document.getElementById('maxBtn');
    const closeBtn = document.getElementById('closeBtn');
    const desktopBookbarn = document.getElementById('desktop-bookbarn');
    const statusFilter = document.getElementById('statusFilter');
    const yearFilter = document.getElementById('yearFilter');
    const sortFilter = document.getElementById('sortFilter');
    const titlebar = document.getElementById('titlebar');
    const resizeHandle = document.getElementById('resizeHandle');
    const detailModal = document.getElementById('detailModal');
    const modalContent = document.getElementById('modalContent');
    const modalClose = document.getElementById('modalClose');

    function updateClock(){
      const now = new Date();
      const hh = String(now.getHours()).padStart(2,'0');
      const mm = String(now.getMinutes()).padStart(2,'0');
      document.getElementById('clock').textContent = `${hh}:${mm}`;
    }
    updateClock();
    setInterval(updateClock, 1000);

    function normalize(text){
      return String(text || '').toLowerCase().trim();
    }

    function escapeHtml(text){
      return String(text)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function getSearchScore(book, query){
      const q = normalize(query);
      if(!q) return 0;

      let score = 0;
      const title = normalize(book.title);
      const author = normalize(book.author);
      const tags = normalize(book.tags.join(' '));
      const publisher = normalize(book.publisher);
      const location = normalize(book.location);
      const category = normalize(book.category);

      if(title === q) score += 100;
      if(title.includes(q)) score += 60;
      if(author.includes(q)) score += 35;
      if(tags.includes(q)) score += 45;
      if(publisher.includes(q)) score += 20;
      if(location.includes(q)) score += 12;
      if(category.includes(q)) score += 16;

      book.tags.forEach(tag => {
        if(normalize(tag) === q) score += 35;
      });

      return score;
    }

    function passesYearFilter(book){
      const val = yearFilter.value;
      if(val === 'all') return true;
      if(val === '2021 or earlier') return Number(book.year) <= 2021;
      return book.year === val;
    }

    function filteredBooks(query){
      const q = normalize(query);
      let items = books.filter(book => {
        const score = q ? getSearchScore(book, q) : 1;
        const matchesSearch = q ? score > 0 : true;
        const matchesStatus = statusFilter.value === 'all' ? true : book.status === statusFilter.value;
        const matchesYear = passesYearFilter(book);
        return matchesSearch && matchesStatus && matchesYear;
      });

      const sort = sortFilter.value;
      items.sort((a, b) => {
        if(sort === 'title') return a.title.localeCompare(b.title, 'en');
        if(sort === 'year_desc') return Number(b.year) - Number(a.year);
        if(sort === 'year_asc') return Number(a.year) - Number(b.year);
        return getSearchScore(b, q) - getSearchScore(a, q) || Number(b.year) - Number(a.year);
      });

      return items;
    }

    function topSuggestions(query){
      return filteredBooks(query).slice(0, 5);
    }

    function getMatchedField(book, query){
      const q = normalize(query);
      if(!q) return 'Combined';
      if(normalize(book.title).includes(q)) return 'Title';
      if(normalize(book.author).includes(q)) return 'Author';
      if(normalize(book.tags.join(' ')).includes(q)) return 'Tags';
      if(normalize(book.publisher).includes(q)) return 'Publisher';
      if(normalize(book.location).includes(q)) return 'Location';
      if(normalize(book.category).includes(q)) return 'Category';
      return 'Combined';
    }

    function getStatusBadgeClass(status){
      if(status === 'Available') return 'available';
      if(status === 'Checked Out') return 'borrowed';
      return 'reference';
    }

    function renderSuggestions(query){
      const items = topSuggestions(query);
      if(!query.trim() || items.length === 0){
        suggestions.classList.remove('show');
        suggestions.innerHTML = '';
        return;
      }

      suggestions.innerHTML = items.map(book => `
        <div class="suggestion" data-title="${escapeHtml(book.title)}">
          <div>
            <strong>${escapeHtml(book.title)}</strong>
            <span>${escapeHtml(book.author)} · ${escapeHtml(book.location)}</span>
          </div>
          <div class="tag">${escapeHtml(book.tags[0])}</div>
        </div>
      `).join('');

      suggestions.classList.add('show');
    }

    function renderInitialState(){
      const total = books.length;
      const available = books.filter(b => b.status === 'Available').length;
      const checkedOut = books.filter(b => b.status === 'Checked Out').length;
      const inLibrary = books.filter(b => b.status === 'In-Library Use Only').length;

      resultsArea.innerHTML = `
        <div class="results-header">
          <h2>🔎 Library Catalog Search</h2>
          <div class="divider"></div>
          <div class="results-summary">
            There are currently <strong>${total}</strong> items in the catalog. Search by title, author, or tags. Instant suggestions display up to <strong>5</strong> results.
          </div>
          <div class="collection-grid">
            <div class="collection-card"><h4>Available</h4><p>${available} items are available for checkout right now.</p></div>
            <div class="collection-card"><h4>Checked Out</h4><p>${checkedOut} items are currently checked out.</p></div>
            <div class="collection-card"><h4>In-Library Use Only</h4><p>${inLibrary} items must be used in the reading room.</p></div>
            <div class="collection-card"><h4>Suggested Searches</h4><p>library, veterinary, parallel, catnip, occult</p></div>
          </div>
        </div>
        <div class="empty-state">Please enter a search term.</div>
      `;
    }

    function metaBox(label, value){
      return `
        <div class="meta">
          <div class="meta-label">${escapeHtml(label)}</div>
          <div class="meta-value">${value}</div>
        </div>
      `;
    }

    function registrationValue(regNo){
      return `${escapeHtml(regNo)} <button class="copy-btn" type="button" data-copy="${escapeHtml(regNo)}">Copy</button>`;
    }

    function renderResults(query, page=1){
      currentQuery = query;
      currentResults = filteredBooks(query);
      currentPage = page;

      const items = currentResults;
      const totalPages = Math.max(1, Math.ceil(items.length / PAGE_SIZE));
      if(currentPage > totalPages) currentPage = totalPages;

      const startIndex = (currentPage - 1) * PAGE_SIZE;
      const pageItems = items.slice(startIndex, startIndex + PAGE_SIZE);
      const safeQuery = escapeHtml(query);

      const header = `
        <div class="results-header">
          <h2>📚 Search Results</h2>
          <div class="divider"></div>
          <div class="results-summary">
            <strong>${items.length}</strong> items found for “<strong>${safeQuery}</strong>”.
          </div>
        </div>
      `;

      if(items.length === 0){
        resultsArea.innerHTML = header + `<div class="empty-state">No items found.</div>`;
        return;
      }

      const cards = pageItems.map(book => `
        <article class="result-card">
          <div class="thumb cover-${book.cover}">
            <small>${escapeHtml(book.category)}</small>
            <strong>${escapeHtml(book.title)}</strong>
            <div class="thumb-author">${escapeHtml(book.author)}</div>
          </div>
          <div class="result-main">
            <h3>${escapeHtml(book.title)}</h3>
            <div class="subline">
              <span class="badge ${getStatusBadgeClass(book.status)}">${escapeHtml(book.status)}</span>
              <span class="badge">${escapeHtml(book.location)}</span>
              <span class="badge">${escapeHtml(book.callNo)}</span>
            </div>
            <div class="meta-grid">
              ${metaBox('Author', escapeHtml(book.author))}
              ${metaBox('Tags', escapeHtml(book.tags.join(', ')))}
              ${metaBox('Due Date', escapeHtml(book.dueDate))}
              ${metaBox('Status', escapeHtml(book.status))}
              ${metaBox('Registration No.', registrationValue(book.regNo))}
              ${metaBox('Supplement', escapeHtml(book.supplement))}
              ${metaBox('Publication Year', escapeHtml(book.year))}
              ${metaBox('Match Field', escapeHtml(getMatchedField(book, query)))}
              ${metaBox('Call Number', escapeHtml(book.callNo))}
              ${metaBox('Location', escapeHtml(book.location))}
              ${metaBox('Publisher', escapeHtml(book.publisher))}
              ${metaBox('Availability', escapeHtml(book.loanable ? 'Available' : 'Unavailable'))}
            </div>
          </div>
          <div class="actions">
            <button class="action-btn detail-btn" data-detail="${escapeHtml(book.regNo)}">View Details</button>
            <button class="action-btn buy-btn" data-buy="${escapeHtml(book.regNo)}">Purchase</button>
            <button class="action-btn loan-btn ${book.loanable ? '' : 'disabled'}" data-loan="${escapeHtml(book.regNo)}">${book.loanable ? 'Check Out' : 'Not Available'}</button>
          </div>
        </article>
      `).join('');

      let pagination = `<div class="pagination">`;
      pagination += `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} data-page="${currentPage - 1}">Previous</button>`;
      for(let i = 1; i <= totalPages; i++){
        pagination += `<button class="page-btn ${i === currentPage ? 'active' : ''}" data-page="${i}">${i}</button>`;
      }
      pagination += `<button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} data-page="${currentPage + 1}">Next</button>`;
      pagination += `</div>`;

      resultsArea.innerHTML = header + `<div class="result-list">${cards}</div>` + pagination;
    }

    function doSearch(value, page=1){
      const q = value.trim();
      suggestions.classList.remove('show');

      if(!q){
        currentQuery = '';
        currentResults = [];
        currentPage = 1;
        renderInitialState();
        return;
      }

      renderResults(q, page);
    }

      const book = books.find(b => b.regNo === regNo);
      if(!book) return;

      modalContent.innerHTML = `

          </div>
        </div>
      `;

      detailModal.classList.add('show');
    }

    function minimizeWindow(){
      bookWindow.classList.add('hidden');
      taskRestore.classList.add('show');
    }

    function restoreWindow(){
      bookWindow.classList.remove('hidden');
      taskRestore.classList.remove('show');
      searchInput.focus();
    }

    function copyText(text){
      navigator.clipboard.writeText(text).then(() => {
        alert('Copied to clipboard');
      }).catch(() => {
        alert('Unable to copy automatically. Please copy it manually.');
      });
    }

    searchInput.addEventListener('input', (e) => {
      renderSuggestions(e.target.value);
    });

    searchInput.addEventListener('keydown', (e) => {
      if(e.key === 'Enter'){
        doSearch(searchInput.value);
      }

    searchBtn.addEventListener('click', () => doSearch(searchInput.value));

    suggestions.addEventListener('click', (e) => {
      const item = e.target.closest('.suggestion');
      if(!item) return;
      const title = item.dataset.title;
      searchInput.value = title;
      doSearch(title);
    });

    document.addEventListener('click', (e) => {
      if(!e.target.closest('.searchbar-wrap')){
        suggestions.classList.remove('show');
      }

      const pageBtn = e.target.closest('.page-btn');
      if(pageBtn && !pageBtn.disabled){
        renderResults(currentQuery, Number(pageBtn.dataset.page));
        return;
      }

      const detailBtn = e.target.closest('[data-detail]');
      if(detailBtn){
        openDetail(detailBtn.dataset.detail);
        return;
      }

      const hot = e.target.closest('.hot-chip');
      if(hot){
        const keyword = hot.dataset.keyword;
        searchInput.value = keyword;
        doSearch(keyword);
        return;
      }

      const copyBtn = e.target.closest('[data-copy]');
      if(copyBtn){
        copyText(copyBtn.dataset.copy);
        return;
      }

      const buyBtn = e.target.closest('[data-buy]');
      if(buyBtn){
        alert('Purchase link can be connected here.');
        return;
      }

      const loanBtn = e.target.closest('[data-loan]');
      if(loanBtn){
        const book = books.find(b => b.regNo === loanBtn.dataset.loan);
        if(book){
          alert(book.loanable ? 'This item is available for checkout.' : 'This item is not available for checkout.');
        }
      }
    });

    [statusFilter, yearFilter, sortFilter].forEach(el => {
      el.addEventListener('change', () => {
        if(searchInput.value.trim()){
          renderSuggestions(searchInput.value);
          renderResults(searchInput.value, 1);
        } else {
          renderInitialState();
        }
      });
    });

    minBtn.addEventListener('click', minimizeWindow);
    taskRestore.addEventListener('click', restoreWindow);
    desktopBookbarn.addEventListener('dblclick', restoreWindow);
    desktopBookbarn.addEventListener('click', restoreWindow);

    closeBtn.addEventListener('click', () => {
      bookWindow.classList.add('hidden');
      taskRestore.classList.remove('show');
    });

    let prevRect = null;

    function toggleMaximize(){
      if(!bookWindow.classList.contains('maximized')){
        prevRect = {
          left: `${bookWindow.offsetLeft}px`,
          top: `${bookWindow.offsetTop}px`,
          width: `${bookWindow.offsetWidth}px`,
          height: `${bookWindow.offsetHeight}px`
        };
        bookWindow.classList.add('maximized');
        maxBtn.textContent = '❐';
      } else {
        bookWindow.classList.remove('maximized');
        if(prevRect){
          bookWindow.style.left = prevRect.left;
          bookWindow.style.top = prevRect.top;
          bookWindow.style.width = prevRect.width;
          bookWindow.style.height = prevRect.height;
        }
        maxBtn.textContent = '□';
      }
    }

    maxBtn.addEventListener('click', toggleMaximize);
    titlebar.addEventListener('dblclick', (e) => {
      if(e.target.closest('.titlebar-controls')) return;
      toggleMaximize();
    });

    let dragging = false;
    let dragOffsetX = 0;
    let dragOffsetY = 0;

    titlebar.addEventListener('mousedown', (e) => {
      if(e.target.closest('.titlebar-controls')) return;
      if(bookWindow.classList.contains('maximized')) return;
      dragging = true;
      bookWindow.classList.add('dragging');
      dragOffsetX = e.clientX - bookWindow.offsetLeft;
      dragOffsetY = e.clientY - bookWindow.offsetTop;
    });

    let resizing = false;
    let startW = 0, startH = 0, startX = 0, startY = 0;

    resizeHandle.addEventListener('mousedown', (e) => {
      if(bookWindow.classList.contains('maximized')) return;
      resizing = true;
      startW = bookWindow.offsetWidth;
      startH = bookWindow.offsetHeight;
      startX = e.clientX;
      startY = e.clientY;
      e.preventDefault();
      e.stopPropagation();
    });

    document.addEventListener('mousemove', (e) => {
      if(dragging){
        const maxLeft = window.innerWidth - bookWindow.offsetWidth;
        const maxTop = window.innerHeight - 44 - bookWindow.offsetHeight;
        const left = Math.min(Math.max(0, e.clientX - dragOffsetX), Math.max(0, maxLeft));
        const top = Math.min(Math.max(0, e.clientY - dragOffsetY), Math.max(0, maxTop));
        bookWindow.style.left = `${left}px`;
        bookWindow.style.top = `${top}px`;
      }

      if(resizing){
        const minW = 860;
        const minH = 560;
        const maxW = window.innerWidth - bookWindow.offsetLeft;
        const maxH = window.innerHeight - 44 - bookWindow.offsetTop;
        const newW = Math.min(Math.max(minW, startW + (e.clientX - startX)), maxW);
        const newH = Math.min(Math.max(minH, startH + (e.clientY - startY)), maxH);
        bookWindow.style.width = `${newW}px`;
        bookWindow.style.height = `${newH}px`;
      }
    });

    document.addEventListener('mouseup', () => {
      dragging = false;
      resizing = false;
      bookWindow.classList.remove('dragging');
    });

    document.getElementById('desktop-amazon').addEventListener('dblclick', () => {
      alert('Connect a real Amazon URL here if needed.');
    });

    modalClose.addEventListener('click', () => detailModal.classList.remove('show'));
    detailModal.addEventListener('click', (e) => {
      if(e.target === detailModal) detailModal.classList.remove('show');
    });

    document.addEventListener('keydown', (e) => {
      if(e.key === 'Escape') detailModal.classList.remove('show');
    });

    renderInitialState();

    window.addEventListener('load', () => {
      bookWindow.classList.remove('hidden');
      bookWindow.classList.add('maximized');
      maxBtn.textContent = '❐';
      searchInput.focus();
    });
  </script>
</body>
</html>
